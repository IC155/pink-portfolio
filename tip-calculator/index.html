<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pink Tip Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #fdf0f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .app {
      background: #fbeaf0;
      border: 1px solid #f4c0d1;
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    h1 { font-size: 24px; font-weight: 500; color: #4b1528; text-align: center; }
    label { font-size: 13px; font-weight: 500; color: #993556; letter-spacing: 0.04em; display: block; margin-bottom: 8px; }
    input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #f4c0d1;
      border-radius: 12px;
      background: #fdf0f5;
      font-size: 16px;
      color: #4b1528;
      outline: none;
      font-family: inherit;
    }
    input[type="number"]:focus { border-color: #d4537e; }
    input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }
    .tip-btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .tip-btn {
      background: #fdf0f5;
      color: #993556;
      border: 1px solid #f4c0d1;
      border-radius: 10px;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }
    .tip-btn.active { background: #d4537e; color: #fbeaf0; border-color: #d4537e; }
    .results {
      background: #4b1528;
      border-radius: 16px;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .result-box { text-align: center; }
    .result-label { font-size: 12px; color: #ed93b1; margin-bottom: 6px; letter-spacing: 0.05em; }
    .result-val { font-size: 26px; font-weight: 500; color: #fbeaf0; }
    .result-box.full { grid-column: span 2; border-top: 1px solid #72243e; padding-top: 16px; }
    .reset-btn {
      background: transparent;
      color: #d4537e;
      border: 1px solid #d4537e;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }
    .reset-btn:hover { background: #fdf0f5; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Tip Calculator</h1>

    <div>
      <label>Bill amount ($)</label>
      <input type="number" id="bill" placeholder="0.00" min="0" step="0.01" oninput="calc()" />
    </div>

    <div>
      <label>Tip percentage</label>
      <div class="tip-btns">
        <button class="tip-btn" onclick="setTip(10, this)">10%</button>
        <button class="tip-btn active" onclick="setTip(15, this)">15%</button>
        <button class="tip-btn" onclick="setTip(20, this)">20%</button>
        <button class="tip-btn" onclick="setTip(25, this)">25%</button>
      </div>
    </div>

    <div>
      <label>Number of people</label>
      <input type="number" id="people" value="1" min="1" step="1" oninput="calc()" />
    </div>

    <div class="results">
      <div class="result-box">
        <div class="result-label">Tip / person</div>
        <div class="result-val" id="tip-per">$0.00</div>
      </div>
      <div class="result-box">
        <div class="result-label">Total / person</div>
        <div class="result-val" id="total-per">$0.00</div>
      </div>
      <div class="result-box full">
        <div class="result-label">Grand total</div>
        <div class="result-val" id="grand">$0.00</div>
      </div>
    </div>

    <button class="reset-btn" onclick="reset()">Reset</button>
  </div>

  <script>
    let tipPct = 15;

    function setTip(pct, btn) {
      tipPct = pct;
      document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      calc();
    }

    function fmt(n) { return '$' + n.toFixed(2); }

    function calc() {
      const bill = parseFloat(document.getElementById('bill').value) || 0;
      const people = Math.max(1, parseInt(document.getElementById('people').value) || 1);
      const tipTotal = bill * tipPct / 100;
      const grand = bill + tipTotal;
      document.getElementById('tip-per').textContent = fmt(tipTotal / people);
      document.getElementById('total-per').textContent = fmt(grand / people);
      document.getElementById('grand').textContent = fmt(grand);
    }

    function reset() {
      document.getElementById('bill').value = '';
      document.getElementById('people').value = 1;
      calc();
    }

    calc();
  </script>
</body>
</html>
